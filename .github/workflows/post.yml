name: Instagram News Bot

on:
  schedule:
    - cron: "0 7,13,19 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests Pillow google-genai gspread google-auth

      - run: python main.py
        env:
          GNEWS_KEY: ${{ secrets.GNEWS_KEY }}
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
          PEXELS_KEY: ${{ secrets.PEXELS_KEY }}
          IMGBB_KEY: ${{ secrets.IMGBB_KEY }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_TOKEN: ${{ secrets.IG_TOKEN }}
          GSHEET_CREDS: ${{ secrets.GSHEET_CREDS }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
