name: Instagram News Bot
on:
  schedule:
    # Runs at 7am, 1pm, 7pm UTC (adjust for your timezone)
    - cron: "0 7,13,19 * * *"
  workflow_dispatch: # Manual trigger for testing

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install requests Pillow google-generativeai gspread
      - run: python main.py
        env:
          GNEWS_KEY: ${{ secrets.GNEWS_KEY }}
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
          PEXELS_KEY: ${{ secrets.PEXELS_KEY }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_TOKEN: ${{ secrets.IG_TOKEN }}
          GSHEET_CREDS: ${{ secrets.GSHEET_CREDS }}
